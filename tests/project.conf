targets=AppBroker,tests.log,transport
cppflags_force=-I ../include
cflags_force=-W `pkg-config --cflags libSystem`
cflags=-Wall -g -O2
ldflags_force=`pkg-config --libs libSystem`
dist=Makefile,AppBroker.interface,tests.sh

[AppBroker]
type=binary
sources=appbroker.c
ldflags=../src/libApp.a

[appbroker.c]
depends=../src/libApp.a,../tools/appbroker.c

[tests.log]
type=script
script=./tests.sh
depends=transport,../src/transport/tcp.c,../src/transport/udp.c

[transport]
type=binary
sources=transport.c
ldflags=-lApp -L../src -Wl,-rpath,../src

[transport.c]
depends=../src/libApp.a
